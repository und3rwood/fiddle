<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tunebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f4ee;
      --surface:   #ffffff;
      --ink:       #1a1710;
      --ink-mid:   #5a5645;
      --ink-faint: #a09c8c;
      --rule:      #ddd9ce;
      --accent:    #6b4c2a;
      --accent-lt: #e8ddd0;
      --play:      #3d6b4c;
      --play-lt:   #d4e8dc;
      --mono:      'IBM Plex Mono', monospace;
      --serif:     'Lora', Georgia, serif;
    }

    html { background: var(--bg); color: var(--ink); font-family: var(--serif); min-height: 100vh; }

    body { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── header ── */
    .site-header { border-bottom: 1px solid var(--rule); padding-bottom: 1.25rem; margin-bottom: 2.5rem; display: flex; align-items: baseline; justify-content: space-between; }
    .site-title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; }
    .site-title em { font-style: italic; color: var(--accent); }
    .site-subtitle { font-size: 0.75rem; font-family: var(--mono); color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── breadcrumb ── */
    .breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-family: var(--mono); color: var(--ink-faint); margin-bottom: 1.75rem; cursor: pointer; width: fit-content; }
    .breadcrumb:hover { color: var(--accent); }
    .breadcrumb svg { flex-shrink: 0; }

    /* ── list view ── */
    #list-view { display: block; }
    .list-heading { font-size: 0.7rem; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1rem; }
/*TODO: stop the bookmarked sections from locking you into the section. If looping is allowed, then loop, otherwise, play the whole song from the bookmark start*/
    .tune-row {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      transition: background 0.15s;
    }
    .tune-row:first-of-type { border-top: 1px solid var(--rule); }
    .tune-row:hover .tune-name { color: var(--accent); }
    .tune-row:hover .tune-num { background: var(--accent-lt); color: var(--accent); }

    .tune-num {
      width: 2.25rem; height: 2.25rem; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.75rem; color: var(--ink-faint);
      transition: all 0.15s;
    }
    .tune-name { font-size: 1.05rem; font-weight: 500; line-height: 1.3; }
    .tune-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
    .tag { font-size: 0.65rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-faint); background: var(--bg); border: 1px solid var(--rule); border-radius: 2px; padding: 1px 6px; }
    .tune-arrow { color: var(--ink-faint); font-size: 1rem; }

    /* ── tune view ── */
    #tune-view { display: none; }
    .tune-title { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.3rem; }
    .tune-meta-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.75rem; }

    /* ── transport bar ── */
    .transport {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .progress-track {
      position: relative; height: 4px; background: var(--rule); border-radius: 2px;
      margin-bottom: 0.85rem; cursor: pointer;
    }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); width: 0%; transition: width 0.25s linear; }
    .progress-region { position: absolute; top: 0; height: 100%; background: var(--play); opacity: 0.35; border-radius: 2px; }
    .progress-head { position: absolute; top: 50%; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); left: 0%; }

    .transport-controls { display: flex; align-items: center; gap: 0.75rem; }
    .btn-play {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background: var(--play); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .btn-play:hover { background: #2e5239; }
    .btn-play:active { transform: scale(0.95); }
    .btn-play svg { fill: #fff; }
    .time-label { font-family: var(--mono); font-size: 0.8rem; color: var(--ink-mid); flex: 1; }
    .speed-group { display: flex; gap: 4px; }
    .speed-btn {
      font-family: var(--mono); font-size: 0.7rem; padding: 3px 8px;
      background: none; border: 1px solid var(--rule); border-radius: 3px;
      color: var(--ink-faint); cursor: pointer; transition: all 0.1s;
    }
    .speed-btn:hover { border-color: var(--accent-lt); color: var(--accent); }
    .speed-btn.active { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); font-weight: 500; }

    .now-playing-label { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.5rem; }
    .now-playing-name { font-size: 0.9rem; font-weight: 500; color: var(--play); }

    /* ── sections ── */
    .sections-heading { font-size: 0.7rem; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin: 1.5rem 0 0.75rem; }

    .section-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--rule); border-radius: 5px;
      margin-bottom: 0.4rem; cursor: pointer; background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .section-row:hover { border-color: var(--accent-lt); }
    .section-row.active { border-color: var(--play); background: var(--play-lt); }

    .section-play-btn {
      width: 2rem; height: 2rem; border-radius: 50%; flex-shrink: 0;
      background: var(--bg); border: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .section-row.active .section-play-btn { background: var(--play); border-color: var(--play); }
    .section-row.active .section-play-btn svg { fill: #fff; }
    .section-play-btn svg { fill: var(--ink-mid); }

    .section-info { flex: 1; min-width: 0; }
    .section-label { font-size: 0.95rem; font-weight: 500; line-height: 1.3; }
    .section-row.active .section-label { color: var(--play); }
    .section-time-range { font-family: var(--mono); font-size: 0.7rem; color: var(--ink-faint); margin-top: 1px; }

    .loop-toggle {
      display: flex; align-items: center; gap: 4px;
      font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 4px 8px; border-radius: 3px;
      background: none; border: 1px solid var(--rule); color: var(--ink-faint);
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .loop-toggle:hover { border-color: var(--accent-lt); color: var(--accent); }
    .loop-toggle.on { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }

    /* ── loading / error states ── */
    .state-msg { font-family: var(--mono); font-size: 0.85rem; color: var(--ink-faint); padding: 2rem 0; text-align: center; }
    .state-msg.err { color: #b04040; }

    /* ── footer ── */
    .site-footer { margin-top: 3rem; border-top: 1px solid var(--rule); padding-top: 1rem; font-family: var(--mono); font-size: 0.7rem; color: var(--ink-faint); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-title">My <em>Tunebook</em></div>
  <div class="site-subtitle">Fiddle Lessons</div>
</header>

<main>
  <!-- LIST VIEW -->
  <section id="list-view">
    <p class="list-heading">All tunes</p>
    <div id="tune-list"><p class="state-msg">Loading tunebook…</p></div>
  </section>

  <!-- TUNE VIEW -->
  <section id="tune-view" aria-live="polite">
    <div class="breadcrumb" id="back-btn" onclick="showList()" role="button" tabindex="0" aria-label="Back to tune list">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      All tunes
    </div>

    <h1 class="tune-title" id="tune-title"></h1>
    <div class="tune-meta-row" id="tune-meta-tags"></div>

    <div class="transport" id="transport">
      <div class="progress-track" id="progress-track">
        <div class="progress-region" id="progress-region" style="display:none;"></div>
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-head" id="progress-head"></div>
      </div>
      <div class="transport-controls">
        <button class="btn-play" id="play-btn" onclick="togglePlay()" aria-label="Play / pause">
          <svg id="play-icon" width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13"/></svg>
        </button>
        <span class="time-label" id="time-label">0:00 / 0:00</span>
        <div class="speed-group" id="speed-group"></div>
      </div>
    </div>

    <p class="now-playing-label">Now playing</p>
    <p class="now-playing-name" id="now-playing-name">—</p>

    <p class="sections-heading">Sections</p>
    <div id="section-list"></div>
  </section>
</main>

<footer class="site-footer">
  Tunebook · built with Audacity labels · hosted on GitHub Pages
</footer>

<audio id="audio-el" preload="auto"></audio>

<script>
/* ────────────────────────────────────────────
   STATE
──────────────────────────────────────────── */
let tunebook   = [];
let currentTune = null;   // { title, tags, audioSrc, sections: [{label, start, end}] }
let activeSec   = null;   // index into currentTune.sections, or null = full tune
let looping     = false;
let audioReady  = false;

const audio = document.getElementById('audio-el');

/* ────────────────────────────────────────────
   BOOT — fetch tunebook.json
──────────────────────────────────────────── */
async function init() {
  try {
    const resp = await fetch('tunebook.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    tunebook = await resp.json();
    renderList();
  } catch (e) {
    document.getElementById('tune-list').innerHTML =
      `<p class="state-msg err">Could not load tunebook.json — ${e.message}</p>`;
  }
}

/* ────────────────────────────────────────────
   LIST VIEW
──────────────────────────────────────────── */
function renderList() {
  const el = document.getElementById('tune-list');
  if (!tunebook.length) { el.innerHTML = '<p class="state-msg">No tunes yet.</p>'; return; }
  el.innerHTML = tunebook.map((tune, i) => {
    const tags = (tune.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const sCount = (tune.sections || []).length;
    return `
      <div class="tune-row" onclick="openTune(${i})" tabindex="0" role="button"
           onkeydown="if(event.key==='Enter')openTune(${i})" aria-label="Open ${esc(tune.title)}">
        <div class="tune-num">${i + 1}</div>
        <div>
          <div class="tune-name">${esc(tune.title)}</div>
          <div class="tune-tags">
            ${tags}
            ${sCount ? `<span class="tag">${sCount} section${sCount!==1?'s':''}</span>` : ''}
          </div>
        </div>
        <div class="tune-arrow">›</div>
      </div>`;
  }).join('');
}

function showList() {
  audio.pause();
  setPlayIcon(false);
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('tune-view').style.display = 'none';
  currentTune = null;
}

/* ────────────────────────────────────────────
   TUNE VIEW
──────────────────────────────────────────── */
function openTune(i) {
  currentTune = tunebook[i];
  activeSec   = null;
  looping     = false;
  audioReady  = false;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('tune-view').style.display = 'block';

  document.getElementById('tune-title').textContent = currentTune.title;

  // tags
  const metaEl = document.getElementById('tune-meta-tags');
  metaEl.innerHTML = (currentTune.tags || [])
    .map(t => `<span class="tag">${esc(t)}</span>`).join('');

  // audio
  audio.src = currentTune.audioSrc;
  audio.playbackRate = 1;
  audio.load();
  setPlayIcon(false);
  document.getElementById('time-label').textContent = '0:00 / 0:00';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-head').style.left = '0%';
  hideRegion();

  // speed buttons — derive from the tune's speedOptions or default
  const speeds = currentTune.speedOptions || [0.5, 0.75, 1];
  const sg = document.getElementById('speed-group');
  sg.innerHTML = speeds.map(s =>
    `<button class="speed-btn${s===1?' active':''}" onclick="setSpeed(this,${s})">${Math.round(s*100)}%</button>`
  ).join('');

  // now playing
  document.getElementById('now-playing-name').textContent = '—';

  // sections
  renderSections();
}

function renderSections() {
  const el = document.getElementById('section-list');
  const secs = currentTune.sections || [];
  if (!secs.length) { el.innerHTML = '<p class="state-msg">No sections defined.</p>'; return; }
  el.innerHTML = secs.map((s, i) => `
    <div class="section-row" id="sec-${i}" onclick="playSection(${i})" tabindex="0" role="button"
         onkeydown="if(event.key==='Enter')playSection(${i})" aria-label="Play section: ${esc(s.label)}">
      <div class="section-play-btn">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
      </div>
      <div class="section-info">
        <div class="section-label">${esc(s.label)}</div>
        <div class="section-time-range">${fmtTime(s.start)} – ${fmtTime(s.end)}</div>
      </div>
      <button class="loop-toggle" id="loop-${i}" onclick="event.stopPropagation(); toggleSectionLoop(${i})" aria-label="Loop this section">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 3.5h7a1.5 1.5 0 0 1 1.5 1.5v.5"/>
          <path d="M10 7.5H3A1.5 1.5 0 0 1 1.5 6V5.5"/>
          <polyline points="8.5,1.5 10,3.5 8.5,5.5" fill="currentColor" stroke="none"/>
          <polyline points="2.5,5.5 1,7.5 2.5,9.5" fill="currentColor" stroke="none"/>
        </svg>
        loop
      </button>
    </div>`
  ).join('');
}

/* ────────────────────────────────────────────
   PLAYBACK
──────────────────────────────────────────── */
function playSection(i) {
  const sec = currentTune.sections[i];
  activeSec = i;
  looping = document.getElementById(`loop-${i}`).classList.contains('on');

  // highlight row
  document.querySelectorAll('.section-row').forEach(r => r.classList.remove('active'));
  document.getElementById(`sec-${i}`).classList.add('active');

  // update pause/play icons in rows
  document.querySelectorAll('.section-play-btn svg').forEach((svg, j) => {
    svg.innerHTML = j === i
      ? '<rect x="1" y="1" width="3" height="8"/><rect x="6" y="1" width="3" height="8"/>'
      : '<polygon points="2,1 9,5 2,9"/>';
  });

  // show region on progress bar
  const dur = audio.duration || 0;
  if (dur > 0) {
    showRegion(sec.start / dur, sec.end / dur);
  }

  document.getElementById('now-playing-name').textContent = sec.label;

  audio.currentTime = sec.start;
  audio.play();
  setPlayIcon(true);
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    setPlayIcon(true);
  } else {
    audio.pause();
    setPlayIcon(false);
  }
}

function setSpeed(btn, val) {
  audio.playbackRate = val;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ────────────────────────────────────────────
   LOOP TOGGLE
──────────────────────────────────────────── */
function toggleSectionLoop(i) {
  const btn = document.getElementById(`loop-${i}`);
  btn.classList.toggle('on');
  if (activeSec === i) looping = btn.classList.contains('on');
}

/* ────────────────────────────────────────────
   AUDIO EVENTS
──────────────────────────────────────────── */
audio.addEventListener('timeupdate', () => {
  const dur  = audio.duration || 0;
  const cur  = audio.currentTime;
  const pct  = dur > 0 ? (cur / dur) * 100 : 0;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-head').style.left  = pct + '%';
  document.getElementById('time-label').textContent =
    `${fmtTime(cur)} / ${fmtTime(dur)}`;

  // enforce section end
  if (activeSec !== null) {
    const sec = currentTune.sections[activeSec];
    if (cur >= sec.end) {
      if (looping) {
        audio.currentTime = sec.start;
      } else {
        audio.pause();
        setPlayIcon(false);
      }
    }
  }
});

audio.addEventListener('loadedmetadata', () => {
  audioReady = true;
  const dur = audio.duration || 0;
  document.getElementById('time-label').textContent = `0:00 / ${fmtTime(dur)}`;
  // update region if a section was already selected
  if (activeSec !== null && dur > 0) {
    const sec = currentTune.sections[activeSec];
    showRegion(sec.start / dur, sec.end / dur);
  }
});

audio.addEventListener('ended', () => {
  if (activeSec !== null && looping) {
    audio.currentTime = currentTune.sections[activeSec].start;
    audio.play();
  } else {
    setPlayIcon(false);
    if (activeSec !== null) {
      document.getElementById(`sec-${activeSec}`).classList.remove('active');
      document.querySelectorAll('.section-play-btn svg').forEach(s =>
        s.innerHTML = '<polygon points="2,1 9,5 2,9"/>');
    }
    activeSec = null;
  }
});

/* progress bar click-to-seek */
document.getElementById('progress-track').addEventListener('click', function(e) {
  if (!audio.duration) return;
  const rect = this.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = frac * audio.duration;
});

/* keyboard: space = play/pause */
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.getElementById('tune-view').style.display !== 'none'
      && !['INPUT','BUTTON','SELECT','TEXTAREA'].includes(e.target.tagName)) {
    e.preventDefault();
    togglePlay();
  }
});

/* ────────────────────────────────────────────
   HELPERS
──────────────────────────────────────────── */
function setPlayIcon(playing) {
  document.getElementById('play-icon').innerHTML = playing
    ? '<rect x="1" y="1" width="4" height="12"/><rect x="9" y="1" width="4" height="12"/>'
    : '<polygon points="3,1 13,7 3,13"/>';
}

function showRegion(startFrac, endFrac) {
  const r = document.getElementById('progress-region');
  r.style.display  = 'block';
  r.style.left     = (startFrac * 100) + '%';
  r.style.width    = ((endFrac - startFrac) * 100) + '%';
}
function hideRegion() {
  document.getElementById('progress-region').style.display = 'none';
}

function fmtTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ────────────────────────────────────────────
   GO
──────────────────────────────────────────── */
init();
</script>
</body>
</html>
